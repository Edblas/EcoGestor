
spring.application.name=ecogestor-backend

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:ecogestordb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Flyway Configuration (disable for H2 since we're using create-drop)
spring.flyway.enabled=false

server.port=8081

# JWT Configuration
jwt.secret=mySecretKeyForJWTGenerationInSpringBoot3ApplicationsThatIsLongEnoughForHS256
jwt.expiration=86400000
