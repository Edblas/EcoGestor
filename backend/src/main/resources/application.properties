spring.application.name=ecogestor-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/ecogestor
spring.datasource.username=ecogestor
spring.datasource.password=ecogestor
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.port=8080

# JWT Configuration
jwt.secret=mySecretKeyForJWTGenerationInSpringBoot3ApplicationsThatIsLongEnoughForHS256
jwt.expiration=86400000
